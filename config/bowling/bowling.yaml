name: "BowlingSim"
# sim-mode: "Frame-by-frame"
# sim-mode: "AFAP"
time-step: 1e-3
end-time: 1000
solver-iters: 1

logging: False
logging-output-folder: "../output/convergence"
logging-interval: 10
log-residuals: True

hdr-image-filename: "../resource/studio_1k.hdr"
create-skybox: True
hdr-scaling: 0.2

ground-plane: False
rod-rod-collisions: True

hash-voxel-size: 1e-1
num-hash-buckets: 31111

