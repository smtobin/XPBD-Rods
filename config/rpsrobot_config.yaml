name: "RPS Sim"
# sim-mode: "Frame-by-frame"
# sim-mode: "AFAP"
time-step: 1e-3
end-time: 100

logging: False
logging-output-folder: "../output/convergence"
logging-interval: 0.01
log-residuals: True

hdr-image-filename: "../resource/studio_1k.hdr"
create-skybox: True

ground-plane: True

objects:
  -
    type: "RPSRobot"
    log-particles: False

    use-normed-constraints: False

    color: [1.0, 0.5, 0.0]