name: "RPS Sim"
# sim-mode: "Frame-by-frame"
# sim-mode: "AFAP"
time-step: 1e-3
end-time: 100
solver-iters: 10

logging: False
logging-output-folder: "../output/convergence"
logging-interval: 1
log-residuals: True

