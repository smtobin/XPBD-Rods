name: "RodSim"
# sim-mode: "Frame-by-frame"
# sim-mode: "AFAP"
time-step: 1e-4
end-time: 100

logging: False
logging-output-folder: "../output/convergence"
logging-interval: 1
log-residuals: True

hdr-image-filename: "../resource/studio_1k.hdr"
create-skybox: True

ground-plane: True

camera-focal-point: [0, 0, 0]
camera-position: [1e-1, 1e-1, -1e-1]
camera-orthographic: False

hash-voxel-size: 1e-2
num-hash-buckets: 31111

objects:
  -
    type: "HexBug"

    body-initial-position: [0, 0.021, 0]
    body-size: [0.0125, 0.007, 0.04]
    body-density: 1030

    motor-angular-velocity: 750

    leg-stiffness: 5e6
    leg-length: 1.5e-2
    leg-length-increment: 0.2e-3
    leg-diameter: 2e-3
    leg-curvature: [10,0,0]

    color: [1.0, 0.5, 0.0]

  -
    type: "HexBug"

    body-initial-position: [0.0, 0.021, -0.1]
    body-size: [0.0125, 0.007, 0.04]
    body-density: 1030

    motor-angular-velocity: 750

    leg-stiffness: 5e6
    leg-length: 1.5e-2
    leg-length-increment: 0.2e-3
    leg-diameter: 2e-3
    leg-curvature: [10,0,0]

    color: [1.0, 0.5, 0.0]

  -
    type: "HexBugHabitat"
