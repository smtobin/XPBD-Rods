name: "RodSim"
# sim-mode: "Frame-by-frame"
sim-mode: "AFAP"
time-step: 1e-4
end-time: 100

logging: False
logging-output-folder: "../output/convergence"
logging-interval: 1
log-residuals: True

hdr-image-filename: "../resource/studio_1k.hdr"
create-skybox: True

ground-plane: True

objects:
  -
    type: "HexBug"

    body-initial-position: [0, 0.023, 0]
    body-size: [0.0125, 0.007, 0.04]
    body-density: 1030

    motor-angular-velocity: 900

    leg-stiffness: 1e6
    leg-length: 1.875e-2
    leg-length-increment: 0.5e-3
    leg-diameter: 2.5e-3
    leg-curvature: [10,0,0]

    color: [1.0, 0.5, 0.0]