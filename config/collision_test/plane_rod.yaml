name: "Plane-Rod Collision"
sim-mode: "Frame-by-frame"
# sim-mod: "Visualization"
time-step: 1e-3
end-time: 100
solver-iters: 1

hdr-image-filename: "../resource/studio_1k.hdr"
create-skybox: True

objects:
  - 
    type: "Rod"
    name: "rod1"
    element-type: "Quadratic"
    initial-position: [0, 0.1, 0.3]
    initial-velocity: [1, 0, 0]
    initial-rotation: [0, 90, 0]
    elements: 5
    E: 5e5
    diameter: 0.1
    length: 1
    nu: 0.3
    base-fixed: False
    tip-fixed: False
    render-type: "PBR"
    # orm-texture-filename: "../resource/textures/Metal050A_4K-PNG/Metal050A_4K-PNG_ORM.png"
    # base-color-texture-filename: "../resource/textures/Metal050A_4K-PNG/Metal050A_4K-PNG_Color.png"
    metallic: 0.2
    roughness: 0.5
    color: [1.0, 0, 1.0]

  - 
    type: "Rod"
    name: "rod1"
    element-type: "Cubic"
    initial-position: [0, 0.1, 0.6]
    initial-velocity: [1, 0, 0]
    initial-rotation: [0, 90, 0]
    elements: 5
    E: 5e5
    diameter: 0.1
    length: 1
    nu: 0.3
    base-fixed: False
    tip-fixed: False
    render-type: "PBR"
    # orm-texture-filename: "../resource/textures/Metal050A_4K-PNG/Metal050A_4K-PNG_ORM.png"
    # base-color-texture-filename: "../resource/textures/Metal050A_4K-PNG/Metal050A_4K-PNG_Color.png"
    metallic: 0.2
    roughness: 0.5
    color: [1.0, 1.0, 0]

  - 
    type: "Rod"
    name: "rod2"
    element-type: "Linear"
    initial-position: [0, 0.1, 0]
    initial-velocity: [1, 0, 0]
    initial-rotation: [0, 90, 0]
    elements: 20
    E: 5e5
    diameter: 0.1
    length: 1
    nu: 0.3
    base-fixed: False
    tip-fixed: False
    render-type: "PBR"
    # orm-texture-filename: "../resource/textures/Metal050A_4K-PNG/Metal050A_4K-PNG_ORM.png"
    # base-color-texture-filename: "../resource/textures/Metal050A_4K-PNG/Metal050A_4K-PNG_Color.png"
    metallic: 0.2
    roughness: 0.5
    color: [1.0, 0, 0]
   