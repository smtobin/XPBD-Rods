name: "RodSim"
# sim-mode: "Frame-by-frame"
sim-mode: "AFAP"
time-step: 1e-2
end-time: 100
solver-iters: 100

logging: False
logging-output-folder: "../output/global_solve"
logging-interval: 10
log-residuals: True

hdr-image-filename: "../resource/studio_1k.hdr"
create-skybox: False

ground-plane: True

camera-focal-point: [0.25,1.5,0]
# camera-position: [0.25,1.5,4]
camera-position: [4,3,4]
camera-orthographic: False

