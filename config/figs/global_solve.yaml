  - 
    type: "Rod"
    name: "gs_solve100iters"
    element-type: "Cubic"
    initial-position: [0, 1.5, -0.3]
    initial-rotation: [0, 90, 0]
    E: 5e6
    nu: 0.4
    diameter: 0.1
    length: 1
    density: 1000
    elements: 5
    global-solve: False
    base-fixed: True
    tip-fixed: False
    collisions: False
    log-particles: True
    render-type: "PBR"
