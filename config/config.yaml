name: "RodSim"
# sim-mode: "Frame-by-frame"
sim-mode: "AFAP"
time-step: 1e-3
end-time: 1000

logging: True
logging-output-folder: "../output/convergence"
logging-interval: 1
log-residuals: True

hdr-image-filename: "../resource/studio_1k.hdr"
create-skybox: True

ground-plane: True

