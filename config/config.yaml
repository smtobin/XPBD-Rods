name: "RodSim"
# sim-mode: "Frame-by-frame"
# sim-mode: "AFAP"
time-step: 1e-2
end-time: 100

logging: False
logging-output-folder: "../output/convergence"
logging-interval: 1
log-residuals: True

hdr-image-filename: "../resource/studio_1k.hdr"
create-skybox: True

ground-plane: False

objects:
  - 
    type: "Rod"
    name: "rod1"
    element-type: "Linear"
    initial-position: [0, 1, 0.0]
    initial-rotation: [0, 0, 0]
    E: 1e6
    nu: 0.4
    diameter: 0.1
    length: 1
    density: 1000
    elements: 5
    base-fixed: True
    tip-fixed: False
    collisions: False
    log-particles: True
    render-type: "PBR"
    # orm-texture-filename: "../resource/textures/Metal050A_4K-PNG/Metal050A_4K-PNG_ORM.png"
    # base-color-texture-filename: "../resource/textures/Metal050A_4K-PNG/Metal050A_4K-PNG_Color.png"
    metallic: 0.0
    roughness: 0.5
    color: [1.0, 0, 0]

  - 
    type: "Rod"
    name: "rod2"
    element-type: "Rigid Body"
    initial-position: [0, 1, 0.0]
    initial-rotation: [0, 0, 0]
    E: 1e6
    nu: 0.4
    diameter: 0.1
    length: 1
    density: 1000
    elements: 5
    base-fixed: True
    tip-fixed: False
    collisions: False
    log-particles: True
    render-type: "PBR"
    # orm-texture-filename: "../resource/textures/Metal050A_4K-PNG/Metal050A_4K-PNG_ORM.png"
    # base-color-texture-filename: "../resource/textures/Metal050A_4K-PNG/Metal050A_4K-PNG_Color.png"
    metallic: 0.0
    roughness: 0.5
    color: [0, 0, 1.0]

