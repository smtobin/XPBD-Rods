name: "RodSim"
# sim-mode: "Frame-by-frame"
sim-mode: "AFAP"
time-step: 1e-2
end-time: 100

logging: False
logging-output-folder: "../output/convergence"
logging-interval: 1
log-residuals: True

hdr-image-filename: "../resource/studio_1k.hdr"
create-skybox: True
exposure: 0.0

ground-plane: True

objects:
  - 
    type: "Rod"
    name: "rod1"
    element-type: "Cubic"
    initial-position: [0, 1, 0.0]
    initial-rotation: [0, 90, 0]
    E: 5e6
    nu: 0.4
    diameter: 0.1
    length: 1
    density: 1000
    elements: 1
    global-solve: true
    base-fixed: True
    tip-fixed: False
    collisions: False
    log-particles: True
    render-type: "PBR"
    # orm-texture-filename: "../resource/textures/Metal050A_4K-PNG/Metal050A_4K-PNG_ORM.png"
    # base-color-texture-filename: "../resource/textures/Metal050A_4K-PNG/Metal050A_4K-PNG_Color.png"
    metallic: 0.0
    roughness: 0.5
    color: [1.0, 0, 0]
    opacity: 1

